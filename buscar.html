<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Buscar todo</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#155e83"/><script>if(sessionStorage.getItem("delsr_maps_auth")!=="1")location.replace("./acceso.html");</script><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><link rel="stylesheet" href="./styles.css?v=20260506-7"/></head><body><main class="app-shell"><header class="topbar"><div class="brand-mini"><img src="logo_ui.png" alt="DLSR MAPS"/><div class="brand-title"><h1>Buscar todo</h1><p>Contrato, placa, referencia, número o coordenadas.</p></div></div><a class="btn btn-light" href="index.html">← Inicio</a></header><section class="panel card"><div class="actions two"><div class="search-area"><label class="searchbox" for="inputValor"><span class="field-icon">⌕</span><input id="inputValor" type="text" placeholder="Escriba contrato, CT, número, alimentador o coordenadas" autocomplete="off" inputmode="search"/></label><div id="suggestions" class="suggestions" hidden></div></div><button id="btnBuscar" class="btn btn-blue" type="button">🔎 Buscar</button><button id="btnLimpiar" class="btn btn-light" type="button">Limpiar</button></div><div id="status" class="status ok">Listo para buscar.</div></section><section class="layout-two"><div><section id="resultCard" class="result-card card"></section><section id="listCard" class="table-card card hidden"><div class="table-wrap"><table class="data-table"><thead><tr><th>Tipo</th><th>Resultado</th><th>Alimentador</th><th>Acción</th></tr></thead><tbody id="tbody"></tbody></table></div></section></div><section class="map-card card"><div id="map" class="map-placeholder"><div><strong>Mapa listo</strong><span>La ubicación se mostrará al seleccionar un resultado.</span></div></div></section></section></main><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script src="./app-core.js?v=20260506-7"></script><script src="./ui-helpers.js?v=20260506-7"></script><script>
let map=null,layer=null,sugs=[],active=-1,seq=0,current=null;const input=document.getElementById('inputValor'),btn=document.getElementById('btnBuscar'),statusEl=document.getElementById('status'),result=document.getElementById('resultCard'),sugEl=document.getElementById('suggestions'),listCard=document.getElementById('listCard'),tbody=document.getElementById('tbody');function asegurarMapa(){if(map)return;map=DLSRUI.crearMapa('map');layer=L.layerGroup().addTo(map)}function status(t,ty){DLSRUI.setStatus(statusEl,t,ty)}function busy(v){btn.disabled=v;btn.textContent=v?'Buscando…':'🔎 Buscar'}function ocultarSugs(){sugEl.hidden=true;sugEl.innerHTML='';sugs=[];active=-1}function resetOut(){result.className='result-card card';result.innerHTML='';listCard.classList.add('hidden');tbody.innerHTML=''}
const pedirSugs=DLSRCore.debounce(async()=>{const v=input.value.trim();const my=++seq;if(DLSRCore.normalizarClave(v).length<2&&DLSRCore.soloDigitos(v).length<2&&!DLSRCore.leerCoordenadas(v)){ocultarSugs();return}try{status('Preparando sugerencias','loading');const items=await DLSRData.sugerirTodo(v,10);if(my!==seq||v!==input.value.trim())return;sugs=items||[];const h=DLSRCore.htmlSeguro;sugEl.innerHTML=sugs.length?'<div class="suggestion-header">Sugerencias</div>'+sugs.map((r,i)=>`<button class="suggestion-item" type="button" data-i="${i}" tabindex="-1"><span class="suggestion-main"><strong>${h(r.item.referencia||r.item.contrato||r.label)}</strong><small>${h((r.item.tipo||r.tipo||'registro')+' · '+(r.item.alimentador||'Sin alimentador'))}</small></span><span class="suggestion-tag">${h(r.tipo||r.item.tipo||'')}</span></button>`).join(''):'<div class="suggestion-empty"><strong>Sin sugerencias</strong><span>Presione Buscar para ampliar la consulta.</span></div>';sugEl.hidden=false;status('Seleccione una sugerencia o presione Buscar.','ok')}catch(e){if(my!==seq)return;ocultarSugs();status(e.message||'No fue posible preparar sugerencias.','error')}},200);
function seleccionar(i,go=true){const r=sugs[i];if(!r)return;input.value=r.item.referencia||r.item.contrato||r.label||'';ocultarSugs();if(go)mostrarItem(r.item,r.tipo||r.item.tipo)}function mover(d){if(sugEl.hidden||!sugs.length)return;const bs=[...sugEl.querySelectorAll('.suggestion-item')];active=(active+d+bs.length)%bs.length;bs.forEach((b,i)=>b.classList.toggle('active',i===active));bs[active].scrollIntoView({block:'nearest'})}
function mostrarItem(item,tipo){item.tipo=tipo||item.tipo||'registro';current=item;if(DLSRCore.coordValida(item.lat,item.lon)){asegurarMapa();layer.clearLayers();L.marker([item.lat,item.lon]).addTo(layer).bindPopup(DLSRUI.popupHtml(item)).openPopup();map.setView([item.lat,item.lon],16)}result.innerHTML=DLSRUI.resultHtml(item,'Resultado de búsqueda general.');result.className='result-card card show';DLSRUI.bindResultActions(result,item);DLSRCore.addReciente(item);status('Resultado seleccionado.','ok')}
function mostrarLista(rows){const h=DLSRCore.htmlSeguro;tbody.innerHTML=(rows||[]).map((r,i)=>{const it=r.item||r;return `<tr><td>${h(r.tipo||it.tipo||'')}</td><td><b>${h(it.referencia||it.contrato||r.label||'Registro')}</b></td><td>${h(it.alimentador||'Sin alimentador')}</td><td><button class="btn small btn-light" data-row="${i}">Abrir</button></td></tr>`}).join('')||'<tr><td colspan="4" class="empty-state"><strong>Sin resultados</strong>Revise el dato ingresado.</td></tr>';listCard.classList.remove('hidden');listCard._rows=rows||[];status((rows&&rows.length)?'Seleccione un resultado de la lista.':'Sin resultados.','warn')}
function mostrarCercanos(res){asegurarMapa();layer.clearLayers();const rows=res.cercanos||[];const base=res.base||{};if(DLSRCore.coordValida(base.lat,base.lon)){L.marker([base.lat,base.lon],{icon:DLSRUI.markerIcon('red')}).addTo(layer).bindPopup(base.titulo||'Punto consultado')}const bounds=[];rows.forEach(it=>{L.marker([it.lat,it.lon]).addTo(layer).bindPopup(DLSRUI.popupHtml(it));bounds.push([it.lat,it.lon])});if(DLSRCore.coordValida(base.lat,base.lon))bounds.push([base.lat,base.lon]);if(bounds.length>1)map.fitBounds(bounds,{padding:[35,35],maxZoom:15});else if(bounds.length)map.setView(bounds[0],16);result.innerHTML=DLSRUI.resultHtml({tipo:'coordenadas',titulo:base.titulo||'Coordenadas',lat:base.lat,lon:base.lon,alimentador:base.extra||''},'Punto base para cercanía.');result.className='result-card card show';mostrarLista(rows.map(x=>({tipo:'cercano',item:x})))}
async function buscar(){const v=input.value.trim();++seq;ocultarSugs();resetOut();if(!v){status('Ingrese un dato de búsqueda.','warn');input.focus();return}try{busy(true);status('Buscando','loading');const res=await DLSRData.buscarTodo(v);if(res.tipo==='coordenadas')mostrarCercanos(res);else if(res.tipo==='resultados'&&res.resultados.length===1)mostrarItem(res.resultados[0].item,res.resultados[0].tipo);else if(res.tipo==='resultados')mostrarLista(res.resultados);else mostrarLista(res.resultados||[])}catch(e){status(e.message||'No fue posible completar la búsqueda.','error')}finally{busy(false)}}function limpiar(){++seq;input.value='';ocultarSugs();resetOut();if(layer)layer.clearLayers();status('Listo para buscar.','ok');input.focus()}
input.addEventListener('input',pedirSugs);input.addEventListener('keydown',e=>{if(e.key==='ArrowDown'){e.preventDefault();mover(1)}else if(e.key==='ArrowUp'){e.preventDefault();mover(-1)}else if(e.key==='Enter'){e.preventDefault();if(!sugEl.hidden&&active>=0)seleccionar(active,true);else buscar()}else if(e.key==='Escape')ocultarSugs()});sugEl.addEventListener('mousedown',e=>e.preventDefault());sugEl.addEventListener('click',e=>{const b=e.target.closest('[data-i]');if(b)seleccionar(Number(b.dataset.i),true)});tbody.addEventListener('click',e=>{const b=e.target.closest('[data-row]');if(!b)return;const r=listCard._rows[Number(b.dataset.row)];if(r)mostrarItem(r.item||r,r.tipo)});document.addEventListener('click',e=>{if(!e.target.closest('.search-area'))ocultarSugs()});btn.onclick=buscar;document.getElementById('btnLimpiar').onclick=limpiar;
</script></body></html>
