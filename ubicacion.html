<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Búsqueda por ubicación — DLSR MAPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f5f99" />
  <script>
    if (sessionStorage.getItem("delsur_maps_auth") !== "1") window.location.replace("./acceso.html");
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles.css?v=20260506-5" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand-mini">
        <img src="logo_ui.png" alt="DLSR MAPS" />
        <div class="brand-title">
          <h1>Búsqueda por ubicación</h1>
          <p>Ingrese coordenadas, referencia o alimentador para encontrar elementos cercanos.</p>
        </div>
      </div>
      <a class="btn btn-light" href="index.html">← Inicio</a>
    </header>

    <section class="panel card search-panel">
      <div class="actions">
        <div class="search-area">
          <label class="searchbox" for="inputValor">
            <span class="field-icon">⌕</span>
            <input id="inputValor" type="text" placeholder="Ejemplo: 13.70, -89.20 / CT1921 / AL242" autocomplete="off" inputmode="search" />
          </label>
        </div>
        <button id="btnBuscar" class="btn btn-primary" type="button">🔎 Buscar</button>
        <button id="btnMiUbicacion" class="btn btn-green" type="button">📡 Mi ubicación</button>
        <button class="btn btn-light" type="button" onclick="limpiar()">Limpiar</button>
      </div>
      <div id="status" class="status ok">Listo para buscar.</div>
    </section>

    <section id="resultCard" class="result-card card"></section>
    <section class="map-card card"><div id="map" class="map-placeholder"><div><strong>Mapa listo</strong>Realice una búsqueda o use su ubicación actual.</div></div></section>

    <h2 class="table-title">Elementos más cercanos</h2>
    <section class="table-wrap card">
      <table id="tablaCercanos">
        <thead>
          <tr>
            <th>Referencia</th>
            <th>Alimentador</th>
            <th>Distancia</th>
            <th>Accesos</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4" style="text-align:center; color:#64748b;">Realice una búsqueda para ver resultados.</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="./app-core.js?v=20260506-5"></script>
  <script>
    let map = null;
    let resultLayer = null;
    let userLayer = null;
    let datosPreparados = false;

    const input = document.getElementById('inputValor');
    const btnBuscar = document.getElementById('btnBuscar');
    const btnMiUbicacion = document.getElementById('btnMiUbicacion');
    const statusEl = document.getElementById('status');
    const resultCard = document.getElementById('resultCard');
    const tbody = document.querySelector('#tablaCercanos tbody');

    function asegurarMapa() {
      if (map) return;
      const mapEl = document.getElementById('map');
      mapEl.className = '';
      mapEl.innerHTML = '';
      map = L.map('map', { zoomControl: true }).setView([13.7, -89.2], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
      resultLayer = L.layerGroup().addTo(map);
      userLayer = L.layerGroup().addTo(map);
      setTimeout(() => map.invalidateSize(), 80);
    }

    function setStatus(texto, tipo = 'info') {
      statusEl.textContent = texto;
      statusEl.className = 'status' + (tipo === 'loading' ? ' loading' : '') + (tipo === 'ok' ? ' ok' : '') + (tipo === 'warn' ? ' warn' : '') + (tipo === 'error' ? ' error' : '');
    }

    function setBusy(activo) {
      btnBuscar.disabled = activo;
      btnMiUbicacion.disabled = activo;
      btnBuscar.textContent = activo ? 'Buscando…' : '🔎 Buscar';
    }

    function ocultarResultado() {
      resultCard.className = 'result-card card';
      resultCard.innerHTML = '';
    }

    function tablaVacia(texto) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#64748b;">${DLSRCore.htmlSeguro(texto)}</td></tr>`;
    }

    function marcadorResultado(item) {
      const h = DLSRCore.htmlSeguro;
      const gmaps = `https://www.google.com/maps?q=${item.lat},${item.lon}`;
      const waze = `https://waze.com/ul?ll=${item.lat},${item.lon}&navigate=yes`;
      const popup = `<b>${h(item.referencia || 'Sin referencia')}</b><br>${item.lat}, ${item.lon}<br>${h(item.alimentador || 'Sin alimentador')}<br>` +
        `<a href='${gmaps}' target='_blank' rel='noopener'>Google Maps</a> | <a href='${waze}' target='_blank' rel='noopener'>Waze</a>`;
      return L.marker([item.lat, item.lon]).bindPopup(popup);
    }

    function mostrarBase(base) {
      const h = DLSRCore.htmlSeguro;
      const lat = base.lat;
      const lon = base.lon;
      const gmaps = `https://www.google.com/maps?q=${lat},${lon}`;
      const waze = `https://waze.com/ul?ll=${lat},${lon}&navigate=yes`;
      resultCard.innerHTML = `
        <div class="result-head">
          <div><h2 class="result-title">${h(base.titulo || 'Punto consultado')}</h2><p class="result-subtitle">Punto base para calcular cercanía.</p></div>
        </div>
        <div class="result-grid">
          <div>Latitud<b>${h(lat)}</b></div>
          <div>Longitud<b>${h(lon)}</b></div>
          ${base.extra ? `<div style="grid-column:1/-1;">Referencia base<b>${h(base.extra)}</b></div>` : ''}
        </div>
        <div class="link-row">
          <a class="link-chip" href="${gmaps}" target="_blank" rel="noopener">📍 Google Maps</a>
          <a class="link-chip" href="${waze}" target="_blank" rel="noopener">🚗 Waze</a>
        </div>`;
      resultCard.className = 'result-card card show';
    }

    function mostrarCercanos(base, cercanos) {
      const h = DLSRCore.htmlSeguro;
      asegurarMapa();
      resultLayer.clearLayers();

      if (!cercanos || !cercanos.length) {
        tablaVacia('No se encontraron resultados.');
        setStatus('No se encontraron resultados.', 'error');
        return;
      }

      if (base) mostrarBase(base);

      const bounds = [];
      for (const item of cercanos) {
        marcadorResultado(item).addTo(resultLayer);
        bounds.push([item.lat, item.lon]);
      }
      if (bounds.length > 1) map.fitBounds(bounds, { padding: [32, 32], maxZoom: 15 });
      else map.setView(bounds[0], 16);

      tbody.innerHTML = cercanos.map(item => {
        const gmaps = `https://www.google.com/maps?q=${item.lat},${item.lon}`;
        const waze = `https://waze.com/ul?ll=${item.lat},${item.lon}&navigate=yes`;
        return `<tr>
          <td>${h(item.referencia || 'Sin referencia')}</td>
          <td>${h(item.alimentador || 'Sin alimentador')}</td>
          <td>${(Number(item.distancia) * 1000).toFixed(0)} m / ${Number(item.distancia).toFixed(2)} km</td>
          <td><a href="${gmaps}" target="_blank" rel="noopener">Maps</a> | <a href="${waze}" target="_blank" rel="noopener">Waze</a></td>
        </tr>`;
      }).join('');

      const first = cercanos[0];
      setTimeout(() => {
        resultLayer.eachLayer(layer => {
          const pos = layer.getLatLng();
          if (Number(pos.lat) === Number(first.lat) && Number(pos.lng) === Number(first.lon)) layer.openPopup();
        });
      }, 120);
      setStatus('Resultados actualizados.', 'ok');
    }

    async function buscar() {
      const valorOriginal = input.value.trim();
      ocultarResultado();
      tablaVacia('Procesando búsqueda.');
      if (resultLayer) resultLayer.clearLayers();

      if (!valorOriginal) {
        setStatus('Ingrese coordenadas, referencia o alimentador.', 'warn');
        tablaVacia('Realice una búsqueda para ver resultados.');
        input.focus();
        return;
      }

      try {
        setBusy(true);
        setStatus(datosPreparados ? 'Buscando' : 'Preparando búsqueda', 'loading');
        const respuesta = await DLSRData.cercanosDesdeConsulta(valorOriginal, 10);
        datosPreparados = true;
        mostrarCercanos(respuesta.base, respuesta.cercanos);
      } catch (err) {
        setStatus(err.message || 'Ocurrió un error al consultar los datos.', 'error');
        tablaVacia('No fue posible completar la búsqueda.');
      } finally {
        setBusy(false);
      }
    }

    function miUbicacion() {
      ocultarResultado();
      tablaVacia('Obteniendo ubicación.');
      asegurarMapa();
      if (!navigator.geolocation) {
        setStatus('Este navegador no soporta geolocalización.', 'error');
        tablaVacia('Este navegador no soporta geolocalización.');
        return;
      }
      setBusy(true);
      setStatus('Obteniendo ubicación', 'loading');
      navigator.geolocation.getCurrentPosition(async pos => {
        try {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          userLayer.clearLayers();
          L.marker([lat, lon], {
            icon: L.icon({
              iconUrl: 'https://maps.gstatic.com/mapfiles/ms2/micons/red-dot.png',
              iconSize: [30, 30],
              iconAnchor: [15, 30]
            })
          }).addTo(userLayer).bindPopup('Tu ubicación').openPopup();
          map.setView([lat, lon], 15);
          const respuesta = await DLSRData.cercanosDesdePunto(lat, lon, 10);
          respuesta.base = { titulo: 'Tu ubicación actual', lat, lon, extra: '' };
          datosPreparados = true;
          mostrarCercanos(respuesta.base, respuesta.cercanos);
        } catch (err) {
          setStatus(err.message || 'No fue posible calcular cercanos.', 'error');
          tablaVacia('No fue posible calcular cercanos.');
        } finally {
          setBusy(false);
        }
      }, () => {
        setBusy(false);
        setStatus('No se pudo obtener la ubicación.', 'error');
        tablaVacia('No se pudo obtener la ubicación.');
      }, { enableHighAccuracy: true, timeout: 12000 });
    }

    function limpiar() {
      input.value = '';
      if (resultLayer) resultLayer.clearLayers();
      if (userLayer) userLayer.clearLayers();
      ocultarResultado();
      tablaVacia('Realice una búsqueda para ver resultados.');
      setStatus('Listo para buscar.', 'ok');
      input.focus();
    }

    btnBuscar.addEventListener('click', buscar);
    btnMiUbicacion.addEventListener('click', miUbicacion);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });
    DLSRCore.precargar(async () => {
      await DLSRData.calentarPlacas();
      datosPreparados = true;
    });
  </script>
</body>
</html>
