<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Búsqueda por ubicación — DLSR MAPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    if (sessionStorage.getItem("delsur_maps_auth") !== "1") window.location.replace("./acceso.html");
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles.css?v=20260506-3" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand-mini">
        <img src="logo.png" alt="DLSR MAPS" />
        <div class="brand-title">
          <h1>Búsqueda por ubicación</h1>
          <p>Ingrese coordenadas, referencia o alimentador para encontrar los puntos más cercanos.</p>
        </div>
      </div>
      <a class="btn btn-light" href="index.html">⬅ Inicio</a>
    </header>

    <section class="panel card">
      <div class="actions">
        <label class="searchbox" for="inputValor">
          <span>📍</span>
          <input id="inputValor" type="text" placeholder="Ejemplo: 13.70, -89.20 / referencia / alimentador" autocomplete="off" />
        </label>
        <button id="btnBuscar" class="btn btn-primary" type="button">🔎 Buscar</button>
        <button id="btnMiUbicacion" class="btn btn-green" type="button">📡 Mi ubicación</button>
        <button class="btn btn-light" type="button" onclick="limpiar()">🧹 Limpiar</button>
      </div>
      <div id="status" class="status loading">Preparando búsqueda</div>
    </section>

    <section id="resultCard" class="result-card card"></section>
    <section class="map-card card"><div id="map"></div></section>

    <h2 class="table-title">10 elementos más cercanos</h2>
    <section class="table-wrap card">
      <table id="tablaCercanos">
        <thead>
          <tr>
            <th>Referencia</th>
            <th>Alimentador</th>
            <th>Distancia</th>
            <th>Accesos</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4" style="text-align:center; color:#64748b;">Realice una búsqueda para ver resultados.</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="./data-config.js?v=20260506-3"></script>
  <script src="./app-core.js?v=20260506-3"></script>
  <script>
    const map = L.map('map', { zoomControl: true }).setView([13.7, -89.2], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const resultLayer = L.layerGroup().addTo(map);
    const userLayer = L.layerGroup().addTo(map);
    const input = document.getElementById('inputValor');
    const btnBuscar = document.getElementById('btnBuscar');
    const btnMiUbicacion = document.getElementById('btnMiUbicacion');
    const statusEl = document.getElementById('status');
    const resultCard = document.getElementById('resultCard');
    const tbody = document.querySelector('#tablaCercanos tbody');

    function setStatus(texto, tipo = 'info') {
      statusEl.textContent = texto;
      statusEl.className = 'status' + (tipo === 'loading' ? ' loading' : '') + (tipo === 'ok' ? ' ok' : '') + (tipo === 'warn' ? ' warn' : '') + (tipo === 'error' ? ' error' : '');
    }

    function setBusy(activo) {
      btnBuscar.disabled = activo;
      btnMiUbicacion.disabled = activo;
      btnBuscar.textContent = activo ? 'Buscando…' : '🔎 Buscar';
    }

    function ocultarResultado() {
      resultCard.className = 'result-card card';
      resultCard.innerHTML = '';
    }

    function tablaVacia(texto) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#64748b;">${DLSRCore.htmlSeguro(texto)}</td></tr>`;
    }

    function marcadorResultado(item) {
      const h = DLSRCore.htmlSeguro;
      const gmaps = `https://www.google.com/maps?q=${item.lat},${item.lon}`;
      const waze = `https://waze.com/ul?ll=${item.lat},${item.lon}&navigate=yes`;
      const popup = `<b>${h(item.referencia || 'Sin referencia')}</b><br>${item.lat}, ${item.lon}<br>${h(item.alimentador || 'Sin alimentador')}<br>` +
        `<a href='${gmaps}' target='_blank' rel='noopener'>Google Maps</a> | <a href='${waze}' target='_blank' rel='noopener'>Waze</a>`;
      return L.marker([item.lat, item.lon]).bindPopup(popup);
    }

    function topCercanos(lat, lon, data) {
      const mejores = [];
      for (const item of data) {
        if (!DLSRCore.coordValida(item.lat, item.lon)) continue;
        const distancia = DLSRCore.distanciaKm(lat, lon, item.lat, item.lon);
        const candidato = { ...item, distancia };
        if (mejores.length < 10) {
          mejores.push(candidato);
          mejores.sort((a, b) => a.distancia - b.distancia);
        } else if (distancia < mejores[mejores.length - 1].distancia) {
          mejores[mejores.length - 1] = candidato;
          mejores.sort((a, b) => a.distancia - b.distancia);
        }
      }
      return mejores;
    }

    function mostrarBase(titulo, lat, lon, extra = '') {
      const h = DLSRCore.htmlSeguro;
      const gmaps = `https://www.google.com/maps?q=${lat},${lon}`;
      const waze = `https://waze.com/ul?ll=${lat},${lon}&navigate=yes`;
      resultCard.innerHTML = `
        <h2 class="result-title">${h(titulo)}</h2>
        <div class="result-grid">
          <div>Latitud<b>${h(lat)}</b></div>
          <div>Longitud<b>${h(lon)}</b></div>
          ${extra ? `<div style="grid-column:1/-1;">Referencia base<b>${h(extra)}</b></div>` : ''}
        </div>
        <div class="link-row">
          <a class="link-chip" href="${gmaps}" target="_blank" rel="noopener">📍 Google Maps</a>
          <a class="link-chip" href="${waze}" target="_blank" rel="noopener">🚗 Waze</a>
        </div>`;
      resultCard.className = 'result-card card show';
    }

    function mostrarCercanos(lat, lon, data) {
      const h = DLSRCore.htmlSeguro;
      const cercanos = topCercanos(lat, lon, data);
      resultLayer.clearLayers();

      if (!cercanos.length) {
        tablaVacia('No hay registros con coordenadas válidas.');
        setStatus('No hay registros con coordenadas válidas.', 'error');
        return;
      }

      const bounds = [];
      for (const item of cercanos) {
        const marker = marcadorResultado(item).addTo(resultLayer);
        bounds.push([item.lat, item.lon]);
      }
      if (bounds.length > 1) map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
      else map.setView(bounds[0], 16);

      tbody.innerHTML = cercanos.map(item => {
        const gmaps = `https://www.google.com/maps?q=${item.lat},${item.lon}`;
        const waze = `https://waze.com/ul?ll=${item.lat},${item.lon}&navigate=yes`;
        return `<tr>
          <td>${h(item.referencia || 'Sin referencia')}</td>
          <td>${h(item.alimentador || 'Sin alimentador')}</td>
          <td>${(item.distancia * 1000).toFixed(0)} m / ${item.distancia.toFixed(2)} km</td>
          <td><a href="${gmaps}" target="_blank" rel="noopener">Maps</a> | <a href="${waze}" target="_blank" rel="noopener">Waze</a></td>
        </tr>`;
      }).join('');

      const first = cercanos[0];
      setTimeout(() => {
        resultLayer.eachLayer(layer => {
          const pos = layer.getLatLng();
          if (Number(pos.lat) === Number(first.lat) && Number(pos.lng) === Number(first.lon)) layer.openPopup();
        });
      }, 100);
      setStatus('Resultados actualizados.', 'ok');
    }

    function leerCoordenadas(texto) {
      const match = texto.match(/^\s*(-?\d+(?:[\.,]\d+)?)\s*[,;\s]+\s*(-?\d+(?:[\.,]\d+)?)\s*$/);
      if (!match) return null;
      const lat = DLSRCore.parseCoord(match[1]);
      const lon = DLSRCore.parseCoord(match[2]);
      return { lat, lon };
    }

    async function buscar() {
      const valorOriginal = input.value.trim();
      resultLayer.clearLayers();
      ocultarResultado();
      tablaVacia('Procesando búsqueda.');

      if (!valorOriginal) {
        setStatus('Ingrese coordenadas, referencia o alimentador.', 'warn');
        tablaVacia('Realice una búsqueda para ver resultados.');
        input.focus();
        return;
      }

      try {
        setBusy(true);
        setStatus('Buscando', 'loading');
        const { data, exacto } = await DLSRCore.cargarPlacas();
        const coords = leerCoordenadas(valorOriginal);

        if (coords) {
          if (!DLSRCore.coordValida(coords.lat, coords.lon)) {
            setStatus('Las coordenadas ingresadas no son válidas.', 'error');
            tablaVacia('Las coordenadas ingresadas no son válidas.');
            return;
          }
          mostrarBase('Coordenadas consultadas', coords.lat, coords.lon);
          mostrarCercanos(coords.lat, coords.lon, data);
          return;
        }

        const buscadoClave = DLSRCore.normalizarClave(valorOriginal);
        const buscadoTexto = DLSRCore.normalizarTexto(valorOriginal);
        let base = exacto.get(buscadoClave) || null;
        if (!base) {
          base = data.find(item =>
            DLSRCore.normalizarClave(item.referencia).includes(buscadoClave) ||
            DLSRCore.normalizarTexto(item.alimentador).includes(buscadoTexto)
          ) || null;
        }

        if (!base) {
          setStatus('No se encontró ninguna coincidencia.', 'error');
          tablaVacia('No se encontró ninguna coincidencia.');
          alert('No se encontró ninguna coincidencia.');
          return;
        }
        if (!DLSRCore.coordValida(base.lat, base.lon)) {
          setStatus('La coincidencia encontrada no tiene coordenadas válidas.', 'error');
          tablaVacia('La coincidencia encontrada no tiene coordenadas válidas.');
          return;
        }

        mostrarBase('Punto base encontrado', base.lat, base.lon, base.referencia || base.alimentador || '');
        mostrarCercanos(base.lat, base.lon, data);
      } catch (err) {
        setStatus(err.message || 'Ocurrió un error al consultar los datos.', 'error');
        tablaVacia('No fue posible completar la búsqueda.');
        alert(err.message || 'Ocurrió un error al consultar los datos.');
      } finally {
        setBusy(false);
      }
    }

    async function miUbicacion() {
      resultLayer.clearLayers();
      userLayer.clearLayers();
      ocultarResultado();
      tablaVacia('Esperando ubicación.');

      if (!navigator.geolocation) {
        setStatus('Geolocalización no soportada en este navegador.', 'error');
        return;
      }

      setBusy(true);
      setStatus('Obteniendo ubicación', 'loading');
      navigator.geolocation.getCurrentPosition(async pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        try {
          L.marker([lat, lon], {
            icon: L.icon({
              iconUrl: 'https://maps.gstatic.com/mapfiles/ms2/micons/red-dot.png',
              iconSize: [30, 30],
              iconAnchor: [15, 30]
            })
          }).addTo(userLayer).bindPopup('Tu ubicación').openPopup();
          map.setView([lat, lon], 15);
          mostrarBase('Tu ubicación actual', lat, lon);
          setStatus('Buscando puntos cercanos', 'loading');
          const { data } = await DLSRCore.cargarPlacas();
          mostrarCercanos(lat, lon, data);
        } catch (err) {
          setStatus(err.message || 'Ocurrió un error al consultar los datos.', 'error');
          tablaVacia('No fue posible completar la búsqueda.');
          alert(err.message || 'Ocurrió un error al consultar los datos.');
        } finally {
          setBusy(false);
        }
      }, () => {
        setBusy(false);
        setStatus('No se pudo obtener su ubicación.', 'error');
        tablaVacia('No se pudo obtener su ubicación.');
      }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function limpiar() {
      input.value = '';
      resultLayer.clearLayers();
      userLayer.clearLayers();
      ocultarResultado();
      tablaVacia('Realice una búsqueda para ver resultados.');
      setStatus('Listo para buscar.', 'ok');
      input.focus();
    }

    btnBuscar.addEventListener('click', buscar);
    btnMiUbicacion.addEventListener('click', miUbicacion);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });

    DLSRCore.cargarPlacas()
      .then(() => setStatus('Listo para buscar.', 'ok'))
      .catch(err => setStatus(err.message || 'No fue posible preparar la búsqueda.', 'error'));
  </script>
</body>
</html>
