<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Búsqueda por ubicación</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#155e83"/><script>if(sessionStorage.getItem("delsr_maps_auth")!=="1")location.replace("./acceso.html");</script><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><link rel="stylesheet" href="./styles.css?v=20260506-7"/></head><body><main class="app-shell"><header class="topbar"><div class="brand-mini"><img src="logo_ui.png" alt="DLSR MAPS"/><div class="brand-title"><h1>Búsqueda por ubicación</h1><p>Encuentre elementos cercanos desde coordenadas, referencia o su posición.</p></div></div><a class="btn btn-light" href="index.html">← Inicio</a></header><section class="panel card"><div class="actions"><div class="search-area"><label class="searchbox" for="inputValor"><span class="field-icon">⌖</span><input id="inputValor" type="text" placeholder="Coordenadas, referencia o alimentador" autocomplete="off" inputmode="search"/></label><div class="filters"><div class="filterbox"><label>Cantidad</label><select id="limit"><option>5</option><option selected>10</option><option>20</option><option>50</option></select></div><div class="filterbox"><label>Alimentador</label><input id="feed" list="feeders" placeholder="Todos"/><datalist id="feeders"></datalist></div><div class="filterbox"><label>Vista</label><select id="view"><option value="all" selected>Todos en mapa</option><option value="first">Solo más cercano</option></select></div></div></div><button id="btnBuscar" class="btn btn-blue" type="button">🔎 Buscar</button><button id="btnMiUbicacion" class="btn btn-green" type="button">📡 Mi ubicación</button><button id="btnLimpiar" class="btn btn-light" type="button">Limpiar</button></div><div id="status" class="status ok">Listo para buscar.</div></section><section class="layout-two"><div><section id="resultCard" class="result-card card"></section><section class="table-card card"><div class="table-wrap"><table class="data-table"><thead><tr><th>Referencia</th><th>Alimentador</th><th>Distancia</th><th>Ruta</th></tr></thead><tbody id="tbody"><tr><td colspan="4" class="empty-state"><strong>Sin resultados</strong>Realice una búsqueda para ver cercanos.</td></tr></tbody></table></div></section></div><section class="map-card card"><div id="map" class="map-placeholder"><div><strong>Mapa listo</strong><span>La ubicación se mostrará al consultar.</span></div></div></section></section></main><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script src="./app-core.js?v=20260506-7"></script><script src="./ui-helpers.js?v=20260506-7"></script><script>
let map=null,resultLayer=null,userLayer=null,inProcess=false,lastBase=null,lastRows=[];const input=document.getElementById('inputValor'),statusEl=document.getElementById('status'),tbody=document.getElementById('tbody'),result=document.getElementById('resultCard'),limitEl=document.getElementById('limit'),feedEl=document.getElementById('feed'),viewEl=document.getElementById('view'),btnBuscar=document.getElementById('btnBuscar'),btnMi=document.getElementById('btnMiUbicacion');function status(t,ty){DLSRUI.setStatus(statusEl,t,ty)}function asegurarMapa(){if(map)return;map=DLSRUI.crearMapa('map');resultLayer=L.layerGroup().addTo(map);userLayer=L.layerGroup().addTo(map)}function refresh(){if(map)setTimeout(()=>map.invalidateSize(),80)}function busy(v,kind='buscar'){btnBuscar.disabled=v;btnMi.disabled=v;btnBuscar.textContent=v&&kind==='buscar'?'Buscando…':'🔎 Buscar';btnMi.textContent=v&&kind==='ubicacion'?'Ubicando…':'📡 Mi ubicación'}function tablaMsg(t){tbody.innerHTML=`<tr><td colspan="4" class="empty-state"><strong>${DLSRCore.htmlSeguro(t)}</strong></td></tr>`}
function mostrarBase(base,sub='Punto base para calcular cercanía.'){const item={tipo:base.tipo||'ubicación',titulo:base.titulo||'Punto consultado',lat:base.lat,lon:base.lon,alimentador:base.extra||''};result.innerHTML=DLSRUI.resultHtml(item,sub);result.className='result-card card show';DLSRUI.bindResultActions(result,item)}
function mostrarSoloUbicacion(lat,lon,acc){asegurarMapa();userLayer.clearLayers();L.marker([lat,lon],{icon:DLSRUI.markerIcon('red')}).addTo(userLayer).bindPopup(acc?`Tu ubicación<br>Precisión aprox.: ${Math.round(acc)} m`:'Tu ubicación').openPopup();map.setView([lat,lon],15);mostrarBase({tipo:'ubicación',titulo:'Tu ubicación actual',lat,lon},'Ubicación detectada. Calculando cercanos.');refresh()}
function renderCercanos(base,rows){lastBase=base;lastRows=rows||[];asegurarMapa();resultLayer.clearLayers();if(!rows||!rows.length){tablaMsg('Sin resultados cercanos');if(base)mostrarBase(base,'No se encontraron elementos cercanos.');status('No se encontraron resultados cercanos.','warn');return}if(base)mostrarBase(base);const bounds=[];if(base&&DLSRCore.coordValida(base.lat,base.lon)){bounds.push([base.lat,base.lon])}const showRows=viewEl.value==='first'?rows.slice(0,1):rows;showRows.forEach(it=>{L.marker([it.lat,it.lon]).addTo(resultLayer).bindPopup(DLSRUI.popupHtml(it));bounds.push([it.lat,it.lon])});if(bounds.length>1)map.fitBounds(bounds,{padding:[34,34],maxZoom:15});else if(bounds.length)map.setView(bounds[0],16);refresh();const h=DLSRCore.htmlSeguro;tbody.innerHTML=rows.map((it,i)=>`<tr><td><b>${h(it.referencia||'Sin referencia')}</b></td><td>${h(it.alimentador||'Sin alimentador')}</td><td>${(Number(it.distancia)*1000).toFixed(0)} m<br><span class="muted">${Number(it.distancia).toFixed(2)} km</span></td><td><a href="${DLSRCore.mapsUrl(it)}" target="_blank">Maps</a> · <a href="${DLSRCore.wazeUrl(it)}" target="_blank">Waze</a><br><button class="btn small btn-light" data-i="${i}">Ver</button></td></tr>`).join('');status('Resultados actualizados.','ok')}
async function consultarDesdePunto(lat,lon,title='Punto consultado',extra=''){tablaMsg('Calculando elementos cercanos.');status('Preparando datos geográficos','loading');const res=await DLSRData.cercanosDesdePunto(lat,lon,Number(limitEl.value||10),feedEl.value.trim());res.base={tipo:'ubicación',titulo:title,lat,lon,extra};renderCercanos(res.base,res.cercanos)}
async function buscar(){const v=input.value.trim();if(!v){status('Ingrese coordenadas, referencia o alimentador.','warn');input.focus();return}try{busy(true,'buscar');tablaMsg('Procesando búsqueda');status('Buscando','loading');const res=await DLSRData.cercanosDesdeConsulta(v,Number(limitEl.value||10),feedEl.value.trim());renderCercanos(res.base,res.cercanos)}catch(e){status(e.message||'No fue posible completar la búsqueda.','error');tablaMsg('No fue posible completar la búsqueda')}finally{busy(false,'buscar')}}
async function miUbicacion(){if(inProcess)return;inProcess=true;asegurarMapa();busy(true,'ubicacion');const cached=DLSRCore.leerUbicacionGuardada();if(cached){mostrarSoloUbicacion(cached.lat,cached.lon,cached.accuracy);tablaMsg('Actualizando ubicación y preparando cercanos')}else{tablaMsg('Solicitando ubicación al navegador')}if(!navigator.geolocation){status('Este navegador no soporta geolocalización.','error');busy(false,'ubicacion');inProcess=false;return}try{status('Solicitando ubicación','loading');const pos=await DLSRCore.obtenerUbicacion();const lat=pos.coords.latitude,lon=pos.coords.longitude,acc=pos.coords.accuracy;DLSRCore.guardarUbicacion(lat,lon,acc);mostrarSoloUbicacion(lat,lon,acc);await consultarDesdePunto(lat,lon,'Tu ubicación actual','')}catch(e){if(cached){status('No se pudo actualizar ubicación; se usó la última ubicación disponible.','warn');try{await consultarDesdePunto(cached.lat,cached.lon,'Última ubicación disponible','')}catch(_){}}else{status(e&&e.code===1?'Permiso de ubicación denegado.':'No se pudo obtener la ubicación.','error');tablaMsg('No se pudo obtener la ubicación')}}finally{busy(false,'ubicacion');inProcess=false;refresh()}}
function limpiar(){input.value='';feedEl.value='';if(resultLayer)resultLayer.clearLayers();if(userLayer)userLayer.clearLayers();result.className='result-card card';result.innerHTML='';tablaMsg('Sin resultados');status('Listo para buscar.','ok');input.focus()}tbody.addEventListener('click',e=>{const b=e.target.closest('[data-i]');if(!b)return;const it=lastRows[Number(b.dataset.i)];if(!it)return;asegurarMapa();resultLayer.eachLayer(l=>{const p=l.getLatLng();if(Math.abs(p.lat-it.lat)<.000001&&Math.abs(p.lng-it.lon)<.000001)l.openPopup()});map.setView([it.lat,it.lon],16)});viewEl.addEventListener('change',()=>{if(lastRows.length)renderCercanos(lastBase,lastRows)});limitEl.addEventListener('change',()=>{if(lastBase&&DLSRCore.coordValida(lastBase.lat,lastBase.lon))consultarDesdePunto(lastBase.lat,lastBase.lon,lastBase.titulo,lastBase.extra)});btnBuscar.onclick=buscar;btnMi.onclick=miUbicacion;document.getElementById('btnLimpiar').onclick=limpiar;input.addEventListener('keydown',e=>{if(e.key==='Enter')buscar()});DLSRCore.precargar(async()=>{try{const feeds=await DLSRData.alimentadores();document.getElementById('feeders').innerHTML=feeds.map(f=>`<option value="${DLSRCore.htmlSeguro(f)}"></option>`).join('')}catch(_){}});
</script></body></html>
