<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Acceso — DLSR MAPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./styles.css?v=20260506-3" />
</head>
<body>
  <main class="login-page">
    <section class="login-card card">
      <img class="login-logo" src="logo.png" alt="DLSR MAPS" />
      <h1>Acceso</h1>
      <p>Ingrese la clave para continuar.</p>

      <form id="form">
        <label for="clave">Clave</label>
        <input id="clave" type="password" autocomplete="current-password" required />
        <button class="btn btn-primary" type="submit" style="width:100%; margin-top:14px;">Entrar</button>
        <div id="err" class="error-text"></div>
      </form>
    </section>
  </main>

  <script>
    const PASS_HASH_HEX = "b0d28f68b1990bae63bf865687aa8c543f1c8d3b703dcb521d1246341efbfe82";

    async function sha256Hex(text) {
      const enc = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest("SHA-256", enc);
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const clave = document.getElementById("clave").value || "";
      const hex = await sha256Hex(clave);
      if (hex === PASS_HASH_HEX) {
        sessionStorage.setItem("delsur_maps_auth", "1");
        window.location.replace("./index.html");
      } else {
        document.getElementById("err").textContent = "Clave incorrecta";
      }
    });

    if (sessionStorage.getItem("delsur_maps_auth") === "1") window.location.replace("./index.html");
  </script>
</body>
</html>
