<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Acceso — DLSR MAPS</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#155e83"/><link rel="stylesheet" href="./styles.css?v=20260506-7"/></head><body class="login-page"><main class="login-card card"><img class="login-logo" src="logo_ui.png" alt="DLSR MAPS"/><h1>Acceso seguro</h1><p>Ingrese la clave para continuar.</p><form id="form"><label for="clave">Clave</label><input id="clave" type="password" autocomplete="current-password" required/><button class="btn btn-blue" type="submit">Entrar</button><div id="err" class="error-text"></div></form></main><script>const PASS_HASH_HEX="b0d28f68b1990bae63bf865687aa8c543f1c8d3b703dcb521d1246341efbfe82";async function sha256Hex(t){const e=new TextEncoder().encode(t);const b=await crypto.subtle.digest("SHA-256",e);return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("")}document.getElementById("form").addEventListener("submit",async e=>{e.preventDefault();const hex=await sha256Hex(document.getElementById("clave").value||"");if(hex===PASS_HASH_HEX){sessionStorage.setItem("delsr_maps_auth","1");location.replace("./index.html")}else document.getElementById("err").textContent="Clave incorrecta"});if(sessionStorage.getItem("delsr_maps_auth")==="1")location.replace("./index.html");</script></body></html>
