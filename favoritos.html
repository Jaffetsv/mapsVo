<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Favoritos y recientes</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#155e83"/><script>if(sessionStorage.getItem("delsr_maps_auth")!=="1")location.replace("./acceso.html");</script><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><link rel="stylesheet" href="./styles.css?v=20260506-7"/></head><body><main class="app-shell"><header class="topbar"><div class="brand-mini"><img src="logo_ui.png" alt="DLSR MAPS"/><div class="brand-title"><h1>Favoritos y recientes</h1><p>Registros guardados localmente en este dispositivo.</p></div></div><a class="btn btn-light" href="index.html">← Inicio</a></header><section class="panel card"><div class="quick-grid"><button id="tabFav" class="btn btn-blue" type="button">Favoritos</button><button id="tabRec" class="btn btn-light" type="button">Recientes</button><button id="btnClear" class="btn btn-danger" type="button">Limpiar lista</button></div><div id="status" class="status ok">Listo.</div></section><section class="layout-two"><section class="table-card card"><div class="table-wrap"><table class="data-table"><thead><tr><th>Registro</th><th>Alimentador</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></section><section class="map-card card"><div id="map" class="map-placeholder"><div><strong>Mapa listo</strong><span>Seleccione un registro para visualizarlo.</span></div></div></section></section></main><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script src="./app-core.js?v=20260506-7"></script><script src="./ui-helpers.js?v=20260506-7"></script><script>
let modo='fav',map=null,layer=null,rows=[];const tbody=document.getElementById('tbody'),statusEl=document.getElementById('status'),tabFav=document.getElementById('tabFav'),tabRec=document.getElementById('tabRec');function status(t,ty){DLSRUI.setStatus(statusEl,t,ty)}function asegurarMapa(){if(map)return;map=DLSRUI.crearMapa('map');layer=L.layerGroup().addTo(map)}function data(){return modo==='fav'?DLSRCore.getFavoritos():DLSRCore.getRecientes()}function render(){rows=data();tabFav.className='btn '+(modo==='fav'?'btn-blue':'btn-light');tabRec.className='btn '+(modo==='rec'?'btn-blue':'btn-light');const h=DLSRCore.htmlSeguro;if(!rows.length){tbody.innerHTML='<tr><td colspan="3" class="empty-state"><strong>Sin registros</strong>Las búsquedas guardadas aparecerán aquí.</td></tr>';status('Sin registros.','warn');return}tbody.innerHTML=rows.map((r,i)=>{const it=r.item||{};return `<tr><td><b>${h(it.referencia||it.contrato||it.titulo||'Registro')}</b><br><span class="muted">${h(it.tipo||'registro')}</span></td><td>${h(it.alimentador||'Sin alimentador')}</td><td><button class="btn small btn-blue" data-open="${i}">Ver</button> <button class="btn small btn-light" data-copy="${i}">Copiar</button> ${DLSRCore.coordValida(it.lat,it.lon)?`<br><a href="${DLSRCore.mapsUrl(it)}" target="_blank">Maps</a> · <a href="${DLSRCore.wazeUrl(it)}" target="_blank">Waze</a>`:''}</td></tr>`}).join('');status(`${rows.length} registro(s).`,'ok')}function abrir(i){const it=rows[i]&&rows[i].item;if(!it||!DLSRCore.coordValida(it.lat,it.lon)){status('El registro no tiene coordenadas válidas.','error');return}asegurarMapa();layer.clearLayers();L.marker([it.lat,it.lon]).addTo(layer).bindPopup(DLSRUI.popupHtml(it)).openPopup();map.setView([it.lat,it.lon],16);status('Registro cargado en mapa.','ok')}tbody.onclick=async e=>{const o=e.target.closest('[data-open]'),c=e.target.closest('[data-copy]');if(o)abrir(Number(o.dataset.open));if(c){const it=rows[Number(c.dataset.copy)].item;await DLSRCore.copiar(DLSRCore.textoCompartir(it));DLSRUI.toast('Copiado')}};tabFav.onclick=()=>{modo='fav';render()};tabRec.onclick=()=>{modo='rec';render()};document.getElementById('btnClear').onclick=()=>{if(modo==='fav')DLSRCore.clearFavoritos();else DLSRCore.clearRecientes();if(layer)layer.clearLayers();render()};render();</script></body></html>
