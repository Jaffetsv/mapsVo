<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Búsqueda por placa</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#155e83"/><script>if(sessionStorage.getItem("delsr_maps_auth")!=="1")location.replace("./acceso.html");</script><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><link rel="stylesheet" href="./styles.css?v=20260506-7"/></head><body><main class="app-shell"><header class="topbar"><div class="brand-mini"><img src="logo_ui.png" alt="DLSR MAPS"/><div class="brand-title"><h1>Búsqueda por placa</h1><p>Referencia completa, parcial o solo número.</p></div></div><a class="btn btn-light" href="index.html">← Inicio</a></header><section class="panel card search-panel"><div class="actions two"><div class="search-area"><label class="searchbox" for="inputValor"><span class="field-icon">⌕</span><input id="inputValor" type="text" placeholder="Ejemplo: CT1921, 1921 o 124-01" autocomplete="off" inputmode="search"/></label><div class="mode-row"><button id="modoReferencia" class="mode-pill active" type="button">General</button><button id="modoNumero" class="mode-pill" type="button">Solo número</button></div><div id="suggestions" class="suggestions" hidden></div></div><button id="btnBuscar" class="btn btn-green" type="button">🔎 Buscar</button><button class="btn btn-light" type="button" id="btnLimpiar">Limpiar</button></div><div id="status" class="status ok">Listo para buscar.</div></section><section id="resultCard" class="result-card card"></section><section class="map-card card"><div id="map" class="map-placeholder"><div><strong>Mapa listo</strong><span>Realice una búsqueda para visualizar la ubicación.</span></div></div></section></main><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script src="./app-core.js?v=20260506-7"></script><script src="./ui-helpers.js?v=20260506-7"></script><script>
let map=null,markerLayer=null,userLayer=null,modo="referencia",sugs=[],active=-1,seq=0,busy=false;const input=document.getElementById('inputValor'),btn=document.getElementById('btnBuscar'),statusEl=document.getElementById('status'),result=document.getElementById('resultCard'),sugEl=document.getElementById('suggestions'),limpiarBtn=document.getElementById('btnLimpiar'),modoRef=document.getElementById('modoReferencia'),modoNum=document.getElementById('modoNumero');
function asegurarMapa(){if(map)return;map=DLSRUI.crearMapa('map');markerLayer=L.layerGroup().addTo(map);userLayer=L.layerGroup().addTo(map)}
function status(t,ty){DLSRUI.setStatus(statusEl,t,ty)}function busySet(v){busy=v;btn.disabled=v;btn.textContent=v?'Buscando…':'🔎 Buscar'}
function ocultarSugs(){sugEl.hidden=true;sugEl.innerHTML='';sugs=[];active=-1}function puede(v){return modo==='numero'?DLSRCore.soloDigitos(v).length>=2:(DLSRCore.normalizarClave(v).length>=2||DLSRCore.soloDigitos(v).length>=2)}
function renderSugs(items){const h=DLSRCore.htmlSeguro;sugs=items||[];active=-1;if(!sugs.length){sugEl.innerHTML='<div class="suggestion-empty"><strong>Sin sugerencias</strong><span>Ingrese más caracteres o revise el dato.</span></div>';sugEl.hidden=false;return}sugEl.innerHTML='<div class="suggestion-header">Sugerencias</div>'+sugs.map((r,i)=>`<button class="suggestion-item" type="button" data-i="${i}" tabindex="-1"><span class="suggestion-main"><strong>${h(r.item.referencia||r.label)}</strong><small>${h(r.item.alimentador||'Sin alimentador')}</small></span><span class="suggestion-tag">${modo==='numero'?'Número':'General'}</span></button>`).join('');sugEl.hidden=false}
const pedirSugs=DLSRCore.debounce(async()=>{const v=input.value.trim();const my=++seq;if(!puede(v)){ocultarSugs();return}try{status('Preparando sugerencias','loading');const items=await DLSRData.sugerirPlacas(v,modo,8);if(my!==seq||v!==input.value.trim())return;renderSugs(items);status('Seleccione una sugerencia o presione Buscar.','ok')}catch(e){if(my!==seq)return;ocultarSugs();status(e.message||'No fue posible preparar sugerencias.','error')}},180);
function seleccionar(i,go=true){const r=sugs[i];if(!r)return;input.value=r.item.referencia||r.label||'';ocultarSugs();if(go)buscar(r.item)}function mover(d){if(sugEl.hidden||!sugs.length)return;const bs=[...sugEl.querySelectorAll('.suggestion-item')];active=(active+d+bs.length)%bs.length;bs.forEach((b,i)=>b.classList.toggle('active',i===active));bs[active].scrollIntoView({block:'nearest'})}
function mostrar(item){if(!DLSRCore.coordValida(item.lat,item.lon)){status('Registro encontrado sin coordenadas válidas.','error');return}asegurarMapa();markerLayer.clearLayers();const m=L.marker([item.lat,item.lon]).addTo(markerLayer).bindPopup(DLSRUI.popupHtml(item)).openPopup();map.setView([item.lat,item.lon],16);result.innerHTML=DLSRUI.resultHtml(item,'Resultado de búsqueda por placa.');result.className='result-card card show';DLSRUI.bindResultActions(result,item);DLSRCore.addReciente(item);status('Registro encontrado.','ok');if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>{if(!userLayer)return;L.marker([p.coords.latitude,p.coords.longitude],{icon:DLSRUI.markerIcon('blue')}).addTo(userLayer).bindPopup('Tu ubicación')},()=>{}, {enableHighAccuracy:false,timeout:5000,maximumAge:300000})}}
async function buscar(item){const v=input.value.trim();++seq;ocultarSugs();result.className='result-card card';result.innerHTML='';if(!v&&!item){status('Ingrese una placa, referencia o número.','warn');input.focus();return}try{busySet(true);status('Buscando','loading');const en=item||await DLSRData.buscarPlaca(v,modo);if(!en){if(markerLayer)markerLayer.clearLayers();status('No se encontró coincidencia.','error');return}mostrar(en)}catch(e){status(e.message||'Ocurrió un error al consultar.','error')}finally{busySet(false)}}
function limpiar(){++seq;input.value='';if(markerLayer)markerLayer.clearLayers();if(userLayer)userLayer.clearLayers();result.className='result-card card';result.innerHTML='';ocultarSugs();status('Listo para buscar.','ok');input.focus()}
input.addEventListener('input',pedirSugs);input.addEventListener('focus',pedirSugs);input.addEventListener('keydown',e=>{if(e.key==='ArrowDown'){e.preventDefault();mover(1)}else if(e.key==='ArrowUp'){e.preventDefault();mover(-1)}else if(e.key==='Enter'){e.preventDefault();if(!sugEl.hidden&&active>=0)seleccionar(active,true);else buscar()}else if(e.key==='Escape')ocultarSugs()});sugEl.addEventListener('mousedown',e=>e.preventDefault());sugEl.addEventListener('click',e=>{const b=e.target.closest('[data-i]');if(b)seleccionar(Number(b.dataset.i),true)});document.addEventListener('click',e=>{if(!e.target.closest('.search-area'))ocultarSugs()});modoRef.onclick=()=>{modo='referencia';modoRef.classList.add('active');modoNum.classList.remove('active');input.placeholder='Ejemplo: CT1921, 1921 o 124-01';ocultarSugs();pedirSugs()};modoNum.onclick=()=>{modo='numero';modoNum.classList.add('active');modoRef.classList.remove('active');input.placeholder='Ejemplo: 1921 o 124-01';ocultarSugs();pedirSugs()};btn.onclick=()=>buscar();limpiarBtn.onclick=limpiar;
</script></body></html>
