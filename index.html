<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>DLSR MAPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    if (sessionStorage.getItem("delsur_maps_auth") !== "1") window.location.replace("./acceso.html");
  </script>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="./styles.css?v=20260506-3" />
</head>
<body>
  <main class="home">
    <section class="home-card card">
      <img class="home-logo" src="logo.png" alt="DLSR MAPS" />
      <h1>Menú principal</h1>
      <p>Seleccione el tipo de búsqueda que desea realizar.</p>

      <nav class="menu">
        <a class="btn btn-primary" href="contrato.html">📄 Búsqueda por contrato</a>
        <a class="btn btn-green" href="placa.html">🪧 Búsqueda por placa</a>
        <a class="btn btn-primary" href="ubicacion.html">📍 Búsqueda por ubicación</a>
      </nav>

      <button class="btn btn-danger" style="width:100%; margin-top:18px;" onclick="sessionStorage.removeItem('delsur_maps_auth'); location.replace('./acceso.html');">Salir</button>
    </section>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
