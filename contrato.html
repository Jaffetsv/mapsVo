<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Búsqueda por contrato — DLSR MAPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    if (sessionStorage.getItem("delsur_maps_auth") !== "1") window.location.replace("./acceso.html");
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles.css?v=20260506-3" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand-mini">
        <img src="logo.png" alt="DLSR MAPS" />
        <div class="brand-title">
          <h1>Búsqueda por contrato</h1>
          <p>Consulta rápida por número de contrato.</p>
        </div>
      </div>
      <a class="btn btn-light" href="index.html">⬅ Inicio</a>
    </header>

    <section class="panel card">
      <div class="actions">
        <label class="searchbox" for="inputValor">
          <span>📄</span>
          <input id="inputValor" type="text" placeholder="Ingrese el contrato" autocomplete="off" inputmode="numeric" />
        </label>
        <button id="btnBuscar" class="btn btn-primary" type="button">🔎 Buscar</button>
        <button class="btn btn-light" type="button" onclick="limpiar()">🧹 Limpiar</button>
      </div>
      <div id="status" class="status loading">Preparando búsqueda</div>
    </section>

    <section id="resultCard" class="result-card card"></section>
    <section class="map-card card"><div id="map"></div></section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="./data-config.js?v=20260506-3"></script>
  <script src="./app-core.js?v=20260506-3"></script>
  <script>
    const map = L.map('map', { zoomControl: true }).setView([13.7, -89.2], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const input = document.getElementById('inputValor');
    const btnBuscar = document.getElementById('btnBuscar');
    const statusEl = document.getElementById('status');
    const resultCard = document.getElementById('resultCard');

    function setStatus(texto, tipo = 'info') {
      statusEl.textContent = texto;
      statusEl.className = 'status' + (tipo === 'loading' ? ' loading' : '') + (tipo === 'ok' ? ' ok' : '') + (tipo === 'warn' ? ' warn' : '') + (tipo === 'error' ? ' error' : '');
    }

    function setBusy(activo) {
      btnBuscar.disabled = activo;
      btnBuscar.textContent = activo ? 'Buscando…' : '🔎 Buscar';
    }

    function ocultarResultado() {
      resultCard.className = 'result-card card';
      resultCard.innerHTML = '';
    }

    function agregarMiUbicacion() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(pos => {
        L.marker([pos.coords.latitude, pos.coords.longitude], {
          icon: L.icon({
            iconUrl: 'https://maps.gstatic.com/mapfiles/ms2/micons/blue-dot.png',
            iconSize: [30, 30],
            iconAnchor: [15, 30]
          })
        }).addTo(markerLayer).bindPopup('Tu ubicación');
      }, () => {}, { enableHighAccuracy: true, timeout: 8000 });
    }

    function mostrarResultado(item) {
      const h = DLSRCore.htmlSeguro;
      const nombre = item.referencia || item.contrato || 'Sin referencia';
      const gmaps = `https://www.google.com/maps?q=${item.lat},${item.lon}`;
      const waze = `https://waze.com/ul?ll=${item.lat},${item.lon}&navigate=yes`;
      const popup = `<b>${h(nombre)}</b><br>Contrato: ${h(item.contrato || '')}<br>${item.lat}, ${item.lon}<br>${h(item.alimentador || 'Sin alimentador')}<br>` +
        `<a href='${gmaps}' target='_blank' rel='noopener'>Google Maps</a> | <a href='${waze}' target='_blank' rel='noopener'>Waze</a>`;

      L.marker([item.lat, item.lon]).addTo(markerLayer).bindPopup(popup).openPopup();
      map.setView([item.lat, item.lon], 16);

      resultCard.innerHTML = `
        <h2 class="result-title">Registro encontrado</h2>
        <div class="result-grid">
          <div>Contrato<b>${h(item.contrato || '')}</b></div>
          <div>Referencia<b>${h(nombre)}</b></div>
          <div>Alimentador<b>${h(item.alimentador || 'Sin alimentador')}</b></div>
          <div>Coordenadas<b>${h(item.lat)}, ${h(item.lon)}</b></div>
        </div>
        <div class="link-row">
          <a class="link-chip" href="${gmaps}" target="_blank" rel="noopener">📍 Google Maps</a>
          <a class="link-chip" href="${waze}" target="_blank" rel="noopener">🚗 Waze</a>
        </div>`;
      resultCard.className = 'result-card card show';
      setStatus('Registro encontrado.', 'ok');
    }

    async function buscar() {
      const valor = input.value.trim();
      markerLayer.clearLayers();
      ocultarResultado();
      if (!valor) {
        setStatus('Ingrese un contrato para buscar.', 'warn');
        input.focus();
        return;
      }

      try {
        setBusy(true);
        setStatus('Buscando', 'loading');
        const { data, exacto } = await DLSRCore.cargarContratos();
        const key = DLSRCore.normalizarClave(valor);
        let encontrado = exacto.get(key) || null;
        if (!encontrado) encontrado = DLSRCore.buscarParcial(data, 'contrato', valor, 4);

        if (!encontrado) {
          setStatus('No se encontró el contrato ingresado.', 'error');
          alert('No se encontró el contrato.');
          return;
        }
        if (!DLSRCore.coordValida(encontrado.lat, encontrado.lon)) {
          setStatus('El contrato fue encontrado, pero no tiene coordenadas válidas.', 'error');
          return;
        }

        agregarMiUbicacion();
        mostrarResultado(encontrado);
      } catch (err) {
        setStatus(err.message || 'Ocurrió un error al consultar los datos.', 'error');
        alert(err.message || 'Ocurrió un error al consultar los datos.');
      } finally {
        setBusy(false);
      }
    }

    function limpiar() {
      input.value = '';
      markerLayer.clearLayers();
      ocultarResultado();
      setStatus('Listo para buscar.', 'ok');
      input.focus();
    }

    btnBuscar.addEventListener('click', buscar);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });

    DLSRCore.cargarContratos()
      .then(() => setStatus('Listo para buscar.', 'ok'))
      .catch(err => setStatus(err.message || 'No fue posible preparar la búsqueda.', 'error'));
  </script>
</body>
</html>
