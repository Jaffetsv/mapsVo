<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Búsqueda por contrato</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#155e83"/><script>if(sessionStorage.getItem("delsr_maps_auth")!=="1")location.replace("./acceso.html");</script><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><link rel="stylesheet" href="./styles.css?v=20260506-7"/></head><body><main class="app-shell"><header class="topbar"><div class="brand-mini"><img src="logo_ui.png" alt="DLSR MAPS"/><div class="brand-title"><h1>Búsqueda por contrato</h1><p>Localice registros por contrato completo o parcial.</p></div></div><a class="btn btn-light" href="index.html">← Inicio</a></header><section class="panel card"><div class="actions two"><div class="search-area"><label class="searchbox" for="inputValor"><span class="field-icon">⌕</span><input id="inputValor" type="text" placeholder="Ingrese contrato" autocomplete="off" inputmode="search"/></label><div id="suggestions" class="suggestions" hidden></div></div><button id="btnBuscar" class="btn btn-blue" type="button">🔎 Buscar</button><button class="btn btn-light" id="btnLimpiar" type="button">Limpiar</button></div><div id="status" class="status ok">Listo para buscar.</div></section><section id="resultCard" class="result-card card"></section><section class="map-card card"><div id="map" class="map-placeholder"><div><strong>Mapa listo</strong><span>Realice una búsqueda para visualizar la ubicación.</span></div></div></section></main><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script src="./app-core.js?v=20260506-7"></script><script src="./ui-helpers.js?v=20260506-7"></script><script>
let map=null,layer=null,sugs=[],active=-1,seq=0;const input=document.getElementById('inputValor'),btn=document.getElementById('btnBuscar'),statusEl=document.getElementById('status'),result=document.getElementById('resultCard'),sugEl=document.getElementById('suggestions');function asegurarMapa(){if(map)return;map=DLSRUI.crearMapa('map');layer=L.layerGroup().addTo(map)}function status(t,ty){DLSRUI.setStatus(statusEl,t,ty)}function busy(v){btn.disabled=v;btn.textContent=v?'Buscando…':'🔎 Buscar'}function ocultarSugs(){sugEl.hidden=true;sugEl.innerHTML='';sugs=[];active=-1}
const pedirSugs=DLSRCore.debounce(async()=>{const v=input.value.trim();const my=++seq;if(DLSRCore.normalizarClave(v).length<2&&DLSRCore.soloDigitos(v).length<2){ocultarSugs();return}try{status('Preparando sugerencias','loading');const items=await DLSRData.sugerirContratos(v,8);if(my!==seq||v!==input.value.trim())return;sugs=items||[];const h=DLSRCore.htmlSeguro;sugEl.innerHTML=sugs.length?'<div class="suggestion-header">Sugerencias</div>'+sugs.map((r,i)=>`<button class="suggestion-item" type="button" data-i="${i}" tabindex="-1"><span class="suggestion-main"><strong>${h(r.item.contrato||r.label)}</strong><small>${h((r.item.referencia? r.item.referencia+' · ':'')+(r.item.alimentador||'Sin alimentador'))}</small></span><span class="suggestion-tag">Contrato</span></button>`).join(''):'<div class="suggestion-empty"><strong>Sin sugerencias</strong><span>Ingrese más caracteres o revise el dato.</span></div>';sugEl.hidden=false;status('Seleccione una sugerencia o presione Buscar.','ok')}catch(e){if(my!==seq)return;ocultarSugs();status(e.message||'No fue posible preparar sugerencias.','error')}},180);
function seleccionar(i,go=true){const r=sugs[i];if(!r)return;input.value=r.item.contrato||r.label||'';ocultarSugs();if(go)buscar(r.item)}function mover(d){if(sugEl.hidden||!sugs.length)return;const bs=[...sugEl.querySelectorAll('.suggestion-item')];active=(active+d+bs.length)%bs.length;bs.forEach((b,i)=>b.classList.toggle('active',i===active));bs[active].scrollIntoView({block:'nearest'})}
function mostrar(item){if(!DLSRCore.coordValida(item.lat,item.lon)){status('Registro encontrado sin coordenadas válidas.','error');return}asegurarMapa();layer.clearLayers();L.marker([item.lat,item.lon]).addTo(layer).bindPopup(DLSRUI.popupHtml(item)).openPopup();map.setView([item.lat,item.lon],16);result.innerHTML=DLSRUI.resultHtml(item,'Resultado de búsqueda por contrato.');result.className='result-card card show';DLSRUI.bindResultActions(result,item);DLSRCore.addReciente(item);status('Registro encontrado.','ok')}
async function buscar(item){const v=input.value.trim();++seq;ocultarSugs();result.className='result-card card';result.innerHTML='';if(!v&&!item){status('Ingrese un contrato.','warn');input.focus();return}try{busy(true);status('Buscando','loading');const en=item||await DLSRData.buscarContrato(v);if(!en){if(layer)layer.clearLayers();status('No se encontró coincidencia.','error');return}mostrar(en)}catch(e){status(e.message||'Ocurrió un error al consultar.','error')}finally{busy(false)}}function limpiar(){++seq;input.value='';if(layer)layer.clearLayers();result.className='result-card card';result.innerHTML='';ocultarSugs();status('Listo para buscar.','ok');input.focus()}
input.addEventListener('input',pedirSugs);input.addEventListener('focus',pedirSugs);input.addEventListener('keydown',e=>{if(e.key==='ArrowDown'){e.preventDefault();mover(1)}else if(e.key==='ArrowUp'){e.preventDefault();mover(-1)}else if(e.key==='Enter'){e.preventDefault();if(!sugEl.hidden&&active>=0)seleccionar(active,true);else buscar()}else if(e.key==='Escape')ocultarSugs()});sugEl.addEventListener('mousedown',e=>e.preventDefault());sugEl.addEventListener('click',e=>{const b=e.target.closest('[data-i]');if(b)seleccionar(Number(b.dataset.i),true)});document.addEventListener('click',e=>{if(!e.target.closest('.search-area'))ocultarSugs()});btn.onclick=()=>buscar();document.getElementById('btnLimpiar').onclick=limpiar;
</script></body></html>
