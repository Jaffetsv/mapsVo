<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Modo campo</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#155e83"/><script>if(sessionStorage.getItem("delsr_maps_auth")!=="1")location.replace("./acceso.html");</script><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><link rel="stylesheet" href="./styles.css?v=20260506-7"/></head><body class="field-mode"><main class="app-shell"><header class="topbar"><div class="brand-mini"><img src="logo_ui.png" alt="DLSR MAPS"/><div class="brand-title"><h1>Modo campo</h1><p>Vista rápida para teléfono y uso operativo.</p></div></div><a class="btn btn-light" href="index.html">← Inicio</a></header><section class="panel card"><div class="actions single"><label class="searchbox" for="inputValor"><span class="field-icon">⌕</span><input id="inputValor" type="text" placeholder="Contrato, placa o número" autocomplete="off" inputmode="search"/></label><button id="btnBuscar" class="btn btn-green" type="button">Buscar</button></div><div class="quick-grid" style="margin-top:10px"><button id="btnLoc" class="btn btn-blue" type="button">Mi ubicación</button><a class="btn btn-light" href="favoritos.html">Favoritos</a><button id="btnClear" class="btn btn-light" type="button">Limpiar</button></div><div id="status" class="status ok">Listo.</div></section><section id="resultCard" class="result-card card field-result"></section><section class="map-card card"><div id="map" class="map-placeholder"><div><strong>Mapa listo</strong><span>Resultado rápido con rutas directas.</span></div></div></section></main><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script src="./app-core.js?v=20260506-7"></script><script src="./ui-helpers.js?v=20260506-7"></script><script>
let map=null,layer=null,current=null;const input=document.getElementById('inputValor'),statusEl=document.getElementById('status'),result=document.getElementById('resultCard'),btn=document.getElementById('btnBuscar');function status(t,ty){DLSRUI.setStatus(statusEl,t,ty)}function asegurarMapa(){if(map)return;map=DLSRUI.crearMapa('map');layer=L.layerGroup().addTo(map)}function busy(v){btn.disabled=v;btn.textContent=v?'Buscando…':'Buscar'}function show(item,sub='Resultado rápido.'){current=item;if(DLSRCore.coordValida(item.lat,item.lon)){asegurarMapa();layer.clearLayers();L.marker([item.lat,item.lon]).addTo(layer).bindPopup(DLSRUI.popupHtml(item)).openPopup();map.setView([item.lat,item.lon],16)}result.innerHTML=DLSRUI.resultHtml(item,sub)+`<div class="field-actions" style="margin-top:12px">${DLSRCore.coordValida(item.lat,item.lon)?`<a class="btn btn-blue" href="${DLSRCore.mapsUrl(item)}" target="_blank">Abrir Maps</a><a class="btn btn-green" href="${DLSRCore.wazeUrl(item)}" target="_blank">Abrir Waze</a>`:''}<button class="btn btn-light" id="copyCoords" type="button">Copiar coordenadas</button><button class="btn btn-light" id="shareItem" type="button">Compartir</button></div>`;result.className='result-card card show field-result';DLSRUI.bindResultActions(result,item);DLSRCore.addReciente(item);document.getElementById('copyCoords').onclick=async()=>{await DLSRCore.copiar(`${item.lat}, ${item.lon}`);DLSRUI.toast('Coordenadas copiadas')};document.getElementById('shareItem').onclick=async()=>{try{await DLSRCore.compartir(item);DLSRUI.toast('Listo')}catch(_){}};status('Resultado listo.','ok')}
async function buscar(){const v=input.value.trim();if(!v){status('Ingrese contrato, placa o número.','warn');input.focus();return}try{busy(true);status('Buscando','loading');const res=await DLSRData.buscarTodo(v);if(res.tipo==='resultados'&&res.resultados.length){show(res.resultados[0].item,res.resultados.length>1?'Se muestra el primer resultado encontrado.':'Resultado encontrado.')}else if(res.tipo==='lista'&&res.resultados.length){show(res.resultados[0].item,'Coincidencia sugerida.')}else if(res.tipo==='coordenadas'){const first=(res.cercanos||[])[0];if(first)show(first,'Elemento más cercano a las coordenadas.');else status('Sin cercanos.','warn')}else status('Sin resultados.','error')}catch(e){status(e.message||'Error al buscar.','error')}finally{busy(false)}}async function ubicacion(){if(!navigator.geolocation){status('Geolocalización no soportada.','error');return}try{status('Ubicando','loading');const pos=await DLSRCore.obtenerUbicacion();DLSRCore.guardarUbicacion(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy);const res=await DLSRData.cercanosDesdePunto(pos.coords.latitude,pos.coords.longitude,1);if(res.cercanos&&res.cercanos[0])show(res.cercanos[0],'Elemento más cercano a su ubicación.');else status('Sin cercanos.','warn')}catch(e){status(e&&e.code===1?'Permiso denegado.':'No se pudo obtener ubicación.','error')}}function limpiar(){input.value='';if(layer)layer.clearLayers();result.className='result-card card field-result';result.innerHTML='';status('Listo.','ok');input.focus()}btn.onclick=buscar;document.getElementById('btnLoc').onclick=ubicacion;document.getElementById('btnClear').onclick=limpiar;input.addEventListener('keydown',e=>{if(e.key==='Enter')buscar()});</script></body></html>
