<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Convertidor JSON</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#155e83"/><script>if(sessionStorage.getItem("delsr_maps_auth")!=="1")location.replace("./acceso.html");</script><link rel="stylesheet" href="./styles.css?v=20260506-7"/></head><body><main class="app-shell"><header class="topbar"><div class="brand-mini"><img src="logo_ui.png" alt="DLSR MAPS"/><div class="brand-title"><h1>Convertidor JSON</h1><p>Genere archivos livianos para acelerar la app en teléfono.</p></div></div><a class="btn btn-light" href="estado.html">← Estado</a></header><section class="panel card"><p class="muted" style="margin-top:0">Seleccione el Excel de datos. El proceso se realiza solo en su navegador. Luego suba los JSON generados a la raíz del repositorio.</p><div class="actions single"><label class="searchbox"><span class="field-icon">▤</span><input id="file" type="file" accept=".xlsx,.xls"/></label><button id="btn" class="btn btn-blue" type="button">Generar JSON</button></div><div id="status" class="status ok">Listo.</div></section><section class="tool-grid" id="downloads"></section></main><script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script><script src="./app-core.js?v=20260506-7"></script><script src="./ui-helpers.js?v=20260506-7"></script><script>
const file=document.getElementById('file'),btn=document.getElementById('btn'),statusEl=document.getElementById('status'),downloads=document.getElementById('downloads');const ALIAS={referencia:["REFERENCIA","Referencia","PLACA","Placa","CODIGO","Código","Ref","REF"],contrato:["Contrato","CONTRATO","NIS","Cuenta","CUENTA","No Contrato","N° Contrato","Numero Contrato","Número Contrato"],lat:["Latitud","LATITUD","Lat","LAT","Latitude","Y"],lon:["Longitud","LONGITUD","Lon","LON","Lng","Longitude","X"],alimentador:["Alimentador","ALIMENTADOR","Feeder","Circuito","CIRCUITO"]};function nk(v){return DLSRCore.normalizarClave(v)}function campo(row,arr){const ks=Object.keys(row||{}),a=arr.map(nk);const k=ks.find(x=>a.includes(nk(x)));return k?row[k]:""}function pc(v){return DLSRCore.parseCoord(v)}function normalPlaca(r){return{tipo:'placa',referencia:campo(r,ALIAS.referencia),lat:pc(campo(r,ALIAS.lat)),lon:pc(campo(r,ALIAS.lon)),alimentador:campo(r,ALIAS.alimentador)||'Sin alimentador'}}function normalContrato(r){return{tipo:'contrato',contrato:campo(r,ALIAS.contrato),referencia:campo(r,ALIAS.referencia),lat:pc(campo(r,ALIAS.lat)),lon:pc(campo(r,ALIAS.lon)),alimentador:campo(r,ALIAS.alimentador)||'Sin alimentador'}}function hoja(wb,names){const s=wb.SheetNames.find(n=>names.map(nk).includes(nk(n)));if(!s)throw new Error('No se encontró una hoja requerida.');return wb.Sheets[s]}function link(name,obj){const blob=new Blob([JSON.stringify(obj)],{type:'application/json'});const url=URL.createObjectURL(blob);return `<a class="mini-card" download="${name}" href="${url}"><strong>Descargar</strong><span>${name}</span></a>`}async function generar(){if(!file.files[0]){DLSRUI.setStatus(statusEl,'Seleccione un Excel.','warn');return}try{btn.disabled=true;DLSRUI.setStatus(statusEl,'Leyendo Excel','loading');const buf=await file.files[0].arrayBuffer();const wb=XLSX.read(buf,{type:'array'});const placas=XLSX.utils.sheet_to_json(hoja(wb,['Placas','Placa','PLACAS','PLACA']),{defval:'',raw:true}).map(normalPlaca).filter(x=>x.referencia);const contratos=XLSX.utils.sheet_to_json(hoja(wb,['Contratos','Contrato','CONTRATOS','CONTRATO']),{defval:'',raw:true}).map(normalContrato).filter(x=>x.contrato);const stamp=new Date().toISOString();downloads.innerHTML=link('data_placas.json',{version:stamp,placas})+link('data_contratos.json',{version:stamp,contratos})+link('data_index.json',{version:stamp,placas,contratos});DLSRUI.setStatus(statusEl,`JSON generado correctamente.`, 'ok')}catch(e){DLSRUI.setStatus(statusEl,e.message||'No fue posible generar JSON.','error')}finally{btn.disabled=false}}btn.onclick=generar;</script></body></html>
